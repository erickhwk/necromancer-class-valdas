system:
  description:
    value: >
      <p>Your <em>Thralls</em> grow stronger under your control, granting
      the following benefits.</p>

      <p><strong>Avoidance.</strong> If one of your thralls is subjected
      to an effect that allows it to make a saving throw to take only
      half damage, it instead takes <strong>no damage</strong> if it
      succeeds on the saving throw, and only half damage if it fails.</p>

      <p><strong>Necrotic Damage.</strong> Whenever one of your thralls
      deals <strong>Bludgeoning, Piercing, or Slashing damage</strong>,
      you can make it deal <strong>Necrotic damage</strong> instead.</p>

      <p><strong>Turn Immunity.</strong> Your thralls have <strong>Immunity
      to the Charmed and Frightened conditions</strong>, and are immune
      to effects that turn Undead.</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>This feature is currently <strong>descriptive</strong>. The
      three benefits affect your thrall actors, not the necromancer
      character. Apply manually as follows:</p>
      <ul>
      <li><em>Avoidance</em>: when a thrall succeeds on a "half-on-save"
      effect, manually set the damage to 0 (instead of half).</li>
      <li><em>Necrotic Damage</em>: tick the damage type to Necrotic
      on the thrall's attack damage roll dialog when desired.</li>
      <li><em>Turn Immunity</em>: open each thrall's sheet and add
      <code>Charmed</code> and <code>Frightened</code> to its Condition
      Immunities (the 2024 SRD thrall stat blocks shipped with this
      module ALREADY include these immunities by default once the
      thralls compendium update lands).</li>
      </ul></section>
