system:
  description:
    value: >
      <p>When you're <strong>hit by an attack roll</strong>, you can
      take a Reaction to force that attack to instead hit one of your
      thralls that is within <strong>5 feet of you</strong>.</p>

      <p>Once you use this feature, you can't do so again until you
      finish a Short or Long Rest. You can also restore your use of
      it by <strong>expending a level 2+ spell slot</strong> (no
      action required).</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>The 1/rest charge is tracked via Limited Uses on this feature
      and recovers on short or long rest. Resolve the redirected-attack
      mechanic manually at the table (move the attack target from you
      to a thrall token within 5 ft). The slot-spend recovery (level 2+)
      is also manual — when you expend a slot for this purpose, mark
      the Uses back to 0/1 on the feature card.</p></section>
