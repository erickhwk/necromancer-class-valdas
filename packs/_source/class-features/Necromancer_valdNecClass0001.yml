system:
  description:
    value: >
      <p><em>Necromancers wield the boundary between life and death like a
      tool — siphoning the threads of vitality that bind the living, refining
      them into raw arcane fuel, and lending them, briefly, to bodies the
      world has already finished with.</em></p>

      <p>Where lesser spellcasters merely study the dark arts, a necromancer
      <em>practices</em> them: animating armies of the lifeless, draining the
      living to mend their thralls, and bending negative energy into a
      personal nexus of power.</p>

      <h3>Core Necromancer Traits</h3>
      <table class="core-class-traits"><tbody>
      <tr><th scope="row"><strong>Primary Ability</strong></th><td>Intelligence</td></tr>
      <tr><th scope="row"><strong>Hit Point Die</strong></th><td>D6 per Necromancer level</td></tr>
      <tr><th scope="row"><strong>Saving Throw Proficiencies</strong></th><td>Constitution and Intelligence</td></tr>
      <tr><th scope="row"><strong>Skill Proficiencies</strong></th><td><em>Choose 2:</em> Arcana, Deception, History, Intimidation, Investigation, Medicine, Persuasion, or Religion</td></tr>
      <tr><th scope="row"><strong>Weapon Proficiencies</strong></th><td>Simple weapons</td></tr>
      <tr><th scope="row"><strong>Armor Training</strong></th><td>None</td></tr>
      <tr><th scope="row"><strong>Starting Equipment</strong></th><td>A dagger and any simple weapon; a component pouch or an arcane focus; a shovel; a dungeoneer's pack or a scholar's pack</td></tr>
      </tbody></table>
