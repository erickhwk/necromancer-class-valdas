system:
  description:
    value: >
      <p>You gain a bonus to Charisma (<strong>Deception,
      Intimidation, and Persuasion</strong>) checks equal to your
      <strong>Intelligence modifier</strong> (minimum bonus of
      <strong>+1</strong>).</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>The bonus is applied automatically via an Active Effect that
      adds <code>max(@abilities.int.mod, 1)</code> to the check bonus
      of Deception, Intimidation, and Persuasion. Disable the effect
      on the sheet's Effects tab to revert.</p>
      </section>
