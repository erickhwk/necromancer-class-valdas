system:
  description:
    value: >
      <p>There are few ambitions the common man fantasizes about more
      than the power to rule. From the ignoble peasant to the haughty
      nobility, many dream of a world in which they are in charge.</p>

      <p>Some necromancers, known as <em>overlords</em>, see their magic
      as an opportunity to accomplish this common dream. Overlords seek
      control both on and off the battlefield, using dark magics to
      bolster their allies as well as manipulate their enemies.</p>
