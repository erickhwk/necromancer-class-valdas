system:
  description:
    value: >
      <p>As a bonus action, you can expend a spell slot to replenish your
      Charnel Touch pool. The pool regains points equal to your
      <strong>Intelligence modifier plus 1d8 for each level of the spell
      slot expended</strong>, up to a maximum of your pool's total.</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>The bundled Activity consumes a spell slot of your choice and
      rolls the recovery formula in chat. The module then automatically
      decreases your Charnel Touch <em>spent</em> uses by the rolled
      amount, capped at 0. The "Recovered Points" roll IS the amount
      applied — no manual adjustment needed.</p></section>
