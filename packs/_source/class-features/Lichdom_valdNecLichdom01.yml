system:
  description:
    value: >
      <p>You unlock the pinnacle of necromantic prowess, through which
      you conquer death itself: <strong>The Rite of Lichdom</strong>.</p>

      <p><strong>Becoming a Lich.</strong> The Rite of Lichdom is a
      ritual that you can perform over the course of 30 days in an
      isolated location. Once completed, your soul is bound to a
      <strong>spirit jar</strong> and you become a lich, an Undead of
      incredible power. You gain the following benefits, as well as
      those granted by your Necromancer subclass.</p>

      <p><strong>Creature Type.</strong> You are <strong>Undead</strong>.
      You are immune to any effect that turns Undead.</p>

      <p><strong>Spirit Jar.</strong> A spirit jar is an object that
      houses a lich's soul, safeguarding its immortality. If you drop to
      0 hit points, your body crumbles to dust and you reform after
      1d4 + 1 days, reviving with all of your hit points. Your new body
      coalesces in an unoccupied space within 5 feet of your spirit jar.
      The new body is identical in every way to the one that was
      destroyed but has none of the original's equipment.</p>

      <p>Every spirit jar has a weakness — a critical flaw by which it
      can be destroyed, allowing its lich to be slain permanently.
      Discuss with your GM the form your spirit jar takes and the
      weakness it possesses.</p>

      <p><strong>Truesight.</strong> You have <strong>Truesight</strong>
      with a range of <strong>120 feet</strong>.</p>

      <p><strong>Undead Immunities.</strong> You have immunity to
      <strong>Necrotic and Poison damage</strong> and to the
      <strong>Exhaustion and Poisoned conditions</strong>.</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>An Active Effect on this feature applies the
      <strong>Undead</strong> creature type and <strong>Truesight 120
      ft</strong> automatically. The L20 <em>Lichdom — Undead
      Immunities</em> Trait advancement grants the four immunities
      (Necrotic + Poison damage, Exhaustion + Poisoned conditions). The
      30-day ritual itself, the spirit jar reformation, and "Turn
      Undead" immunity are descriptive — narrate at the table.</p>
      </section>
