system:
  description:
    value: >
      <p>You can draw upon an inner nexus of necromantic power. You have
      a pool of <strong>Charnel Touch points</strong> equal to <strong>5
      &times; your Necromancer level</strong> that replenishes when you
      finish a Long Rest.</p>

      <p>As a <strong>Magic action</strong>, you can channel this negative
      energy through your touch. Choose a number of Charnel Touch points
      to expend, up to a maximum of <strong>5 &times; your Proficiency
      Bonus</strong>, and make a melee spell attack against one creature
      within reach. On a hit, the target takes Necrotic damage equal to
      the number of points expended. This damage is doubled without
      expending additional points if the attack roll scores a Critical
      Hit. If the spell attack misses, the Charnel Touch points aren't
      expended.</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>The <strong>Strike</strong> activity rolls a melee spell attack
      and deals necrotic damage equal to the number of points you choose
      to expend (Points to Spend slider).</p>
      <p>The <strong>Heal Undead</strong> activity is also bundled here
      for convenience: in the 2024 ruleset, healing undead with Charnel
      Touch points is described under <em>Thralls</em> ("Healing your
      Thralls" sub-feature). This module currently exposes it from the
      Charnel Touch sheet for ergonomics; mechanics are identical.</p>
      </section>
