system:
  description:
    value: >
      <p>As a Bonus Action, you can expend <strong>5 or more</strong>
      Charnel Touch points to create an empowering aura in a
      <strong>30-foot Emanation</strong> originating from you until the
      start of your next turn.</p>

      <p>Undead you control within the Emanation gain a bonus to
      <strong>D20 Tests</strong> (attack rolls, ability checks, and
      saving throws), <strong>damage rolls</strong>, and <strong>AC</strong>.
      This bonus equals <strong>+1 for every 5 Charnel Touch points
      expended</strong>, to a maximum of <strong>+3</strong>
      (5/10/15 points).</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>The 2024 rule is an emanation that automatically affects all
      undead you control within 30 ft. This module exposes the buff via
      three activities — <em>Aura Pulse (+1) / (+2) / (+3)</em> — that
      respectively consume 5 / 10 / 15 Charnel Touch points. Target each
      thrall token within the aura, then click <em>Apply Effect</em> on
      the chat card to apply the 1-round buff. The effect grants the
      D20 Test bonus (attack/check/save), damage, and AC.</p>
      <p><strong>Recommended modules for auto-expiration:</strong>
      <em>Dynamic Active Effects (DAE)</em> + <em>Times-Up</em>. The
      bundled Active Effects carry <code>flags.dae.specialDuration:
      ["turnStartSource"]</code>, which DAE uses to remove them at the
      start of the necromancer's next turn. Without DAE, the effect
      will be flagged as expired but Foundry will not delete it —
      remove it manually from each thrall's sheet.</p></section>
