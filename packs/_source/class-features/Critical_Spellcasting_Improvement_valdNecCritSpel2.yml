system:
  description:
    value: >
      <p>Your <em>Critical Spellcasting</em> feature improves in the
      following ways.</p>

      <p><strong>Critical Failures.</strong> A creature suffers a
      Critical Failure when it rolls a <strong>1 or 2</strong> on the
      d20 for a saving throw against one of your spells.</p>

      <p><strong>Improved Critical.</strong> Your spell attacks now
      score a critical hit on a roll of <strong>18&ndash;20</strong>
      on the d20.</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>This feature carries an Active Effect (priority 100) that
      overrides the L5 effect, lowering your spell crit threshold to
      18. The Critical Failures threshold raise (1 or 2) is detected
      automatically by the module's JS hook — the same Critical
      Spellcasting chat card posts when a creature rolls a 1 or 2 on
      a save against one of your spells.</p></section>
