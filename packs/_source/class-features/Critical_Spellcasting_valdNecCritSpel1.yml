system:
  description:
    value: >
      <p>Your potent Necromancy grants you the following benefits.</p>

      <p><strong>Critical Failures.</strong> When a creature rolls a 1
      on the d20 for a saving throw against one of your spells, it
      suffers a Critical Failure. It fails the save regardless of its
      modifiers or the spell save DC. If the spell deals damage, you
      roll all of the spell's damage dice twice and add them together,
      then add any relevant modifiers. This additional damage applies
      only to the creature that rolled a 1.</p>

      <p><strong>Improved Critical.</strong> Your spell attacks score
      a critical hit on a roll of 19 or 20 on the d20.</p>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p><em>Improved Critical</em> (lowered spell-attack crit threshold
      to 19+) is applied through the Active Effect attached to this
      feature.</p>
      <p><em>Critical Failures</em> are detected by the module's JS hook:
      when a creature rolls a natural 1 on a save against one of your
      spells, a chat card titled <strong>Critical Spellcasting</strong>
      announces the auto-fail and posts the additional damage rolled
      from doubled spell dice. Click the chat card's <em>Apply</em>
      button to deal the extra damage to the target. Apply the spell's
      base damage in full (not half) on the original spell card, since
      the save auto-fails.</p>
      <p>The 14th-level <em>Improved Critical Spellcasting</em>
      separately upgrades both the crit threshold (to 18+) and the
      Critical Failure threshold (to a roll of 1 or 2).</p></section>
