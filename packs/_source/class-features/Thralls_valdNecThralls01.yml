system:
  description:
    value: >
      <p>Unlike other spellcasters, you animate Undead creatures with a
      portion of your own life force, ensuring obedience.</p>

      <p><strong>Animate Thralls.</strong> You can animate Undead thralls
      by performing a ritual over the course of <strong>10 minutes</strong>,
      which can be done during a Short Rest. The remains of one or more
      Medium or Small Humanoids within 30 feet of yourself rise as Undead
      creatures. These Undead become your thralls, and you maintain
      control over them indefinitely.</p>

      <p><strong>Available thrall stat blocks</strong> (from this module's
      <em>Necromancer Thralls</em> compendium):</p>

      <ul>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecBloodlrk1]{Bloodlurk} — CR 2</li>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecBonebst01]{Bone Beast} — CR 1</li>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecDeadnght1]{Deadnaught} — CR 1</li>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecGorger001]{Gorger} — CR 1</li>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecSkelet001]{Skeleton} — CR 1/4</li>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecSpirit001]{Spirit} — CR 1/4</li>
      <li>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecZombie001]{Zombie} — CR 1/4</li>
      </ul>

      <p><strong>Combat.</strong> You can mentally control all your
      thralls without an action. If you have the <em>Incapacitated</em>
      condition, your thralls move to protect your body from harm but
      won't attack.</p>

      <p>In combat, your thralls take their turns immediately before or
      after your turn each round (your choice). All thralls collectively
      share <strong>one Reaction and one Bonus Action</strong> per round,
      which a single thrall can use.</p>

      <p><strong>Attacks and Save DCs.</strong> Thralls use <strong>your
      spell attack modifier</strong> for their attacks. If one of your
      thralls forces a creature to make a saving throw, it uses
      <strong>your spell save DC</strong>.</p>

      <p><strong>Healing your Thralls.</strong> You can use your
      <em>Charnel Touch</em> on Undead under your control without making
      an attack roll. Instead of dealing Necrotic damage, the Undead
      regains hit points equal to the number of Charnel Touch points
      expended.</p>

      <p><strong>Maximum Thralls.</strong> At 2nd level you can animate
      and control one thrall of CR 1/4. As you gain Necromancer levels,
      you can animate more thralls. The combined CR of all your thralls
      can't exceed the value in the <em>CR Total</em> column of the
      Necromancer table, and the total number of thralls under your
      control can't exceed the value in the <em>Thralls</em> column.</p>

      <p>At any time, you can take a Magic action to sever your connection
      to one or more thralls. Corporeal Undead crumple into a heap and
      incorporeal Undead flee to the Ethereal Plane.</p>

      <p><strong>Other Undead.</strong> When you cast <em>animate dead</em>,
      <em>create undead</em>, or another spell that lets you create or
      control Undead, those Undead count as your thralls and can be
      commanded as such. If they exceed your CR or thrall-count limits,
      you can immediately sever your connection to existing thralls to
      stay within the limits. Your thralls can never command or create
      other Undead.</p>

      <p>You can't reanimate Undead that have been reduced to 0 hit
      points. Your Animate Thralls ritual, the <em>animate dead</em>
      spell, and similar magic only affect Humanoid corpses; the
      resulting thralls are Undead creatures.</p>

      <section class="secret"><p><strong>Necromancer Variant Rules</strong></p>

      <p><strong>Necromancy Unleashed.</strong> In order to ensure timely,
      balanced play, this class imposes limitations on the number of
      Undead a player can command, including with spells such as
      <em>animate dead</em>. Use this variant rule if you want to throw
      caution to the wind and embrace the undead horde experience: ignore
      the "Other Undead" section above. Undead animated with spells are
      separate from your thralls for the purposes of your class features
      and have no other class-based limitations.</p>

      <p><strong>Alternate Necromancers.</strong> Necromancers may fuel
      their spellcasting through ambition or zeal rather than intellect.
      When you become a Necromancer, you can choose <strong>Wisdom or
      Charisma</strong> for the Primary Ability in the Core Necromancer
      Traits. The chosen ability becomes your spellcasting ability and
      replaces any Necromancer feature that uses Intelligence. A
      Necromancer that uses Wisdom is called a "Resurrectionist"; one
      that uses Charisma is called a "Ghoul."</p></section>

      <section class="secret"><p><strong>Foundry Note</strong></p>
      <p>The thralls cap (count and CR) is exposed via the
      <code>@scale.necromancer.thralls-max</code> and
      <code>@scale.necromancer.thrall-cr</code> scale values on the
      class. Track manually — the module does not enforce the limit
      automatically.</p>
      <p>The "Healing your Thralls" mechanic is implemented as the
      <em>Heal Undead</em> activity on your <em>Charnel Touch</em>
      feature.</p></section>
