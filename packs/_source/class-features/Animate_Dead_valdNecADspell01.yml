system:
  description:
    value: >-
      <p><em>Necromancer-modified version. Casting time, target choice,
      and creature options are altered per the class's Animate Dead
      feature.</em></p>

      <p>Choose a pile of bones, a corpse, or a recent corpse of a
      Medium or Small creature (any type, not just Humanoid) within
      range. The target becomes one of your <em>thralls</em>:</p>

      <ul>
      <li>A <strong>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecSkelet001]{Skeleton}</strong>
      if you chose a pile of bones.</li>
      <li>A <strong>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecZombie001]{Zombie}</strong>
      if you chose a corpse.</li>
      <li>A <strong>@UUID[Compendium.necromancer-class-valdas.thralls.Actor.valdNecSpirit001]{Spirit}</strong>
      if you chose the recent corpse (dead within the last hour) of a
      creature you can use as a Spirit.</li>
      </ul>

      <p>The undead created by this spell is your thrall and obeys you
      indefinitely under the rules of your <em>Thralls</em> class
      feature (it counts toward your CR/thrall-count limits). The 24-hour
      control window of the standard <em>animate dead</em> spell does
      <em>not</em> apply.</p>

      <p><strong>Using a Higher-Level Spell Slot.</strong> You animate
      <strong>two additional Undead creatures for each spell slot level
      above 3</strong>. Each must come from a different corpse or pile
      of bones.</p>
