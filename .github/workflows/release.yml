name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update module.json with release URLs and version
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          jq --arg v "$VERSION" \
             --arg manifest "https://github.com/$REPO/releases/download/$TAG/module.json" \
             --arg download "https://github.com/$REPO/releases/download/$TAG/module.zip" \
             '.version = $v | .manifest = $manifest | .download = $download' \
             module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Foundry VTT CLI
        run: npm install -g @foundryvtt/foundryvtt-cli

      - name: Compile compendium packs
        run: |
          fvtt package pack --id necromancer-class-valdas --type Module --yaml \
            --in packs/_source/class-features --out packs class-features
          fvtt package pack --id necromancer-class-valdas --type Module --yaml \
            --in packs/_source/thralls --out packs thralls

      - name: Build module.zip
        run: |
          zip -r module.zip \
            module.json \
            packs/ \
            scripts/ \
            lang/ \
            LICENSE \
            README.md \
            CHANGELOG.md \
            -x 'packs/_source/*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            module.json
            module.zip
          draft: false
          prerelease: false
          generate_release_notes: true
